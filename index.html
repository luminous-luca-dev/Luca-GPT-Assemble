<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-X3BJ0V6JXE"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-X3BJ0V6JXE');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luca-GPT トークルーム</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="chat-app">
        <div id="url-banner" class="hidden">
            <p class="banner-text">このトークの専用URL（いつでも続きから再開できます）</p>
            <div class="copy-box">
                <input type="text" id="share-url" readonly>
                <button id="copy-btn"><i class="fa-regular fa-copy"></i> コピー</button>
            </div>
        </div>

        <header id="chat-header">
            <div class="header-back"><i class="fa-solid fa-chevron-left"></i></div>
            <div class="header-info">
                <span class="avatar">L</span>
                <span class="room-name">Luca</span>
            </div>
            <div class="header-menu"><i class="fa-solid fa-bars"></i></div>
        </header>

        <main id="chat-timeline">
            </main>

        <footer id="chat-footer">
            <div class="input-container">
                <textarea id="message-input" rows="1" placeholder="メッセージを入力..."></textarea>
                <button id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
